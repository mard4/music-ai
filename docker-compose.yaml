services:
  mongodb:
    image: mongo:latest
    container_name: db
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db

  qdrant:
      image: qdrant/qdrant
      container_name: qdrant
      ports:
        - "6333:6333"
        - "6334:6334"
      volumes:
        - ./qdrant_data:/qdrant/storage
      restart: unless-stopped