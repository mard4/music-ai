# CLAP Configuration
device: "cuda"
num_workers: 4
mixed_precision: true

training:
  # Hyperparameters
  learning_rate: 1e-4
  weight_decay: 0.1
  batch_size: 16
  epochs: 10

  # Optimizer
  optimizer_type: "AdamW"
  beta1: 0.9
  beta2: 0.999
  epsilon: 1e-8

  # Scheduler
  scheduler_type: "CosineAnnealingLR"
  scheduler_params:
    T_max: 1000
    eta_min: 1e-6

  # Training controls
  patience: 10
  log_interval: 10
  checkpoint_interval: 5
  max_grad_norm: 1.0

  # CLAP specific
  logit_scale: 100.0

  # Mixed precision
  use_amp: true
  amp_dtype: "float16"

  # Data split
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

audio_processing:
  target_sample_rate: 48000
  max_duration_seconds: 10.0
  normalize_audio: true
  trim_silence: true
  silence_threshold_db: -40.0

model:
  model_name: "CLAP_Module"
  enable_fusion: false
  pretrained: true
  freeze_backbone: false

  # Embedding dimensions
  audio_embedding_dim: 512
  text_embedding_dim: 512
  projection_dim: 512

evaluation:
  # Retrieval metrics
  k_values: [1, 5, 10]
  compute_map: true
  compute_mrr: true

  # Similarity thresholds
  similarity_thresholds: [0.3, 0.5, 0.7, 0.9]

  # Visualization
  save_embeddings: true
  plot_confusion_matrix: true
  plot_roc_curve: false